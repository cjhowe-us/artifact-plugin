name = "release-note"
target_scheme = "document"
description = "Fill-in markdown template for release note."
contract_version = 1

[[inputs]]
name = "version"
type = "string"
required = true

[[inputs]]
name = "released_at"
type = "string"
required = true

[output]
path_template = "docs/releases/{{ version }}"

[output.create_input]
version = "{{ version }}"
released_at = "{{ released_at }}"
