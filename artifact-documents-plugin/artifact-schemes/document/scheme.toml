name             = "document"
scheme           = "document"
kind             = "vertex"
description      = "Markdown document with structured content (title, authors, status)."
contract_version = 1

# Documents in file storage: a .md body plus a .content.toml companion.
[[storage]]
name                  = "file"
body_field            = "body"
body_path_template    = "{{ id }}.md"
content_path_template = "{{ id }}.content.toml"
content_serializer    = "toml"

# Documents in Confluence: each artifact = one page. Path template is ignored
# by the remote storage; identifier comes from the URI (space/page-id).
[[storage]]
name = "document-confluence"
