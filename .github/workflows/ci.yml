name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff check + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  mypy:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - run: |
          uvx --python 3.11 \
            --with "pydantic>=2,<3" \
            --with "tomlkit>=0.13" \
            --with "jinja2>=3.1" \
            mypy --config-file pyproject.toml

  pyright:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv .venv --python 3.12
      - run: uv pip install --python .venv/bin/python "pydantic>=2,<3" "tomlkit>=0.13" "jinja2>=3.1" "pytest>=8"
      - run: uvx pyright

  pre-commit:
    name: pre-commit (new-file-tests + aggregate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pre-commit needs history for diff-against-main
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uvx pre-commit run --all-files --show-diff-on-failure

  test:
    name: pytest ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            artifact-plugin/pyproject.toml
            artifact-documents-plugin/pyproject.toml
            artifact-github-plugin/pyproject.toml

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run pytest with coverage
        shell: bash
        run: |
          uv run --python ${{ matrix.python }} \
            --with "pydantic>=2,<3" \
            --with "tomlkit>=0.13" \
            --with "jinja2>=3.1" \
            --with "pytest>=8" \
            --with "pytest-xdist>=3" \
            --with "pytest-cov>=5" \
            pytest -q \
              --cov=artifact-plugin/scripts \
              --cov=artifact-plugin/hooks \
              --cov=artifact-github-plugin/scripts \
              --cov=artifact-documents-plugin/scripts \
              --cov-report=term \
              --cov-report=xml \
              --cov-fail-under=75 \
              artifact-plugin/tests artifact-documents-plugin/tests artifact-github-plugin/tests

      - name: Upload coverage.xml
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
