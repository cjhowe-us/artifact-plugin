name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            artifact-plugin/pyproject.toml
            artifact-documents-plugin/pyproject.toml
            artifact-github-plugin/pyproject.toml

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run pytest
        shell: bash
        run: |
          uv run --python ${{ matrix.python }} \
            --with "pydantic>=2,<3" \
            --with "tomlkit>=0.13" \
            --with "jinja2>=3.1" \
            --with "pytest>=8" \
            --with "pytest-xdist>=3" \
            pytest -q artifact-plugin/tests artifact-documents-plugin/tests artifact-github-plugin/tests
